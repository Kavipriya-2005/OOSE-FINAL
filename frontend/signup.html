<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Access | SwiftPass</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", Arial, sans-serif; }
        body { background-color: #f1f5f9; }
        header { background: linear-gradient(to right, #1e3a8a, #2563eb); color: white; text-align: center; padding: 30px; }
        header h1 { font-size: 34px; }
        header p { margin-top: 8px; font-size: 16px; }
        .card { background-color: white; width: 460px; margin: 50px auto; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.12); text-align: center; }
        .card h2 { color: #1e3a8a; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 15px; }
        input:focus { outline: none; border-color: #2563eb; }
        button { width: 100%; padding: 13px; margin-top: 12px; background-color: #1e3a8a; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; }
        button:hover { background-color: #2563eb; }
        hr { margin: 30px 0; }
        .msg { margin-top: 10px; font-size: 14px; font-weight: 600; }
        .success { color: green; }
        .error { color: red; }
        footer { background-color: #0f172a; color: white; text-align: center; padding: 18px; margin-top: 50px; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <h1>✈️ SwiftPass ✈️</h1>
    <p>Apply • Verify • Fly</p>
</header>

<section class="card">

    <!-- SIGN UP -->
    <h2>Create Account</h2>
    <input type="text" id="signupName" placeholder="Full Name" required>
    <input type="email" id="signupEmail" placeholder="Email ID" required>
    <input type="password" id="signupPassword" placeholder="Password" required>
    <button onclick="handleSignup()">📝 Sign Up</button>
    <p class="msg" id="signupMsg"></p>

    <hr>

    <!-- SIGN IN -->
    <h2>Already Registered?</h2>
    <input type="email" id="signinEmail" placeholder="Email ID" required>
    <input type="password" id="signinPassword" placeholder="Password" required>
    <button onclick="handleSignin()">🔐 Sign In</button>
    <p class="msg" id="signinMsg"></p>

</section>

<footer>
    <p><strong>SwiftPass – Passport Automation System</strong></p>
    <p>© 2026 SwiftPass | Government of India</p>
</footer>

<script>
    async function handleSignup() {
        const full_name = document.getElementById('signupName').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const msg = document.getElementById('signupMsg');

        if (!full_name || !email || !password) {
            msg.textContent = 'Please fill all fields.';
            msg.className = 'msg error';
            return;
        }

        try {
            const res = await fetch('/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ full_name, email, password })
            });
            const data = await res.json();

            if (data.success) {
                msg.textContent = '✅ Account created! Please sign in below.';
                msg.className = 'msg success';
            } else {
                msg.textContent = '❌ ' + data.error;
                msg.className = 'msg error';
            }
        } catch (err) {
            msg.textContent = '❌ Server error. Try again.';
            msg.className = 'msg error';
        }
    }

    async function handleSignin() {
        const email = document.getElementById('signinEmail').value;
        const password = document.getElementById('signinPassword').value;
        const msg = document.getElementById('signinMsg');

        if (!email || !password) {
            msg.textContent = 'Please fill all fields.';
            msg.className = 'msg error';
            return;
        }

        try {
            const res = await fetch('/api/auth/signin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (data.success) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('userName', data.name);
                window.location.href = 'index1.html';
            } else {
                msg.textContent = '❌ ' + data.error;
                msg.className = 'msg error';
            }
        } catch (err) {
            msg.textContent = '❌ Server error. Try again.';
            msg.className = 'msg error';
        }
    }
</script>

</body>
</html>
