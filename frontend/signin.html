<!DOCTYPE html>
<html>
<head>
    <title>Sign In - Passport Automation System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Sign In</h1>
</header>

<section class="card">
    <form id="signinForm">
        <input type="email" id="signinEmail" placeholder="Email ID" required>
        <input type="password" id="signinPassword" placeholder="Password" required>
        <button type="submit">Sign In</button>
    </form>
    
    <div class="form-footer">
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>
</section>

<script>
    document.getElementById('signinForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = document.getElementById('signinEmail').value;
        
        // Get stored credentials
        const storedEmail = sessionStorage.getItem('userEmail');
        const storedPassword = sessionStorage.getItem('userPassword');
        const storedName = sessionStorage.getItem('userName');
        const inputPassword = document.getElementById('signinPassword').value;
        
        // Check if credentials match
        if (email === storedEmail && inputPassword === storedPassword) {
            // Redirect to index page
            window.location.href = 'index1.html';
        } else {
            alert('Invalid email or password. Please try again or sign up.');
        }
    });
</script>

</body>
</html>
